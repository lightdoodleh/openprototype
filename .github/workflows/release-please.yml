name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: 静态红线检查（含导航树同步）
        run: node scripts/check/run-checks.js --static-only
      - name: 服务器冒烟（启动 / 静态页 / 畸形 URL 不崩溃 / dotfile 屏蔽）
        run: |
          node runtime/server.js --port 8123 &
          SERVER_PID=$!
          sleep 1.5
          curl -sf http://127.0.0.1:8123/product/demo/pc/index.html > /dev/null
          test "$(curl -s -o /dev/null -w '%{http_code}' 'http://127.0.0.1:8123/%')" = "400"
          test "$(curl -s -o /dev/null -w '%{http_code}' 'http://127.0.0.1:8123/.git/config')" = "403"
          curl -sf http://127.0.0.1:8123/product/demo/pc/index.html > /dev/null
          kill $SERVER_PID
      - name: create 脚手架流程（生成项目 + 依赖模式跑检查器）
        run: |
          node bin/cli.js create /tmp/ci-app
          cd /tmp/ci-app
          node "$GITHUB_WORKSPACE/scripts/check/static-check.js" --json | node -e "
            let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{
              const r=JSON.parse(s);
              if(r.scanned<1){console.error('依赖模式下未扫到新项目页面');process.exit(1)}
              console.log('scanned',r.scanned,'errors',r.errors.length);
              process.exit(r.errors.length?1:0);
            })"
      - name: doctor / help 不报错
        run: |
          node bin/cli.js doctor
          node bin/cli.js --help

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: 安装 Chromium
        run: npx playwright install --with-deps chromium
      - name: 运行时冒烟（无头浏览器打开全部 demo 页面，含 mode=view 物理隐藏检查）
        run: node scripts/check/smoke-test.js
      - name: 失败截图存档
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-please-smoke-screenshots
          path: scripts/check/_screenshots/
          if-no-files-found: ignore

  release:
    needs: [verify, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: node
      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}
      - uses: actions/setup-node@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: 安装 Trusted Publishing 所需的 npm 版本
        if: ${{ steps.release.outputs.release_created }}
        run: npm install --global npm@11.5.1
      - run: npm ci
        if: ${{ steps.release.outputs.release_created }}
      - name: 确认版本尚未发布
        if: ${{ steps.release.outputs.release_created }}
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")
          if npm view "$package_name@$package_version" version > /dev/null 2>&1; then
            echo "::error::npm 上已存在 $package_name@$package_version，不能覆盖发布"
            exit 1
          fi
      - name: 发布 npm 包（Trusted Publishing）
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish --provenance
